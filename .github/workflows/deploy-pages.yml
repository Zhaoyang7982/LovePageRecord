name: Deploy GitHub Pages

# 将 love-record 目录推送到 gh-pages 分支，由「从分支发布 Pages」提供站点。
# 仓库 Settings → Pages：Source 选「Deploy from a branch」，Branch 选 gh-pages，文件夹选 / (root)。

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push love-record to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./love-record
