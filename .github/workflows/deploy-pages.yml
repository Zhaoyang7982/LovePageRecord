name: Deploy GitHub Pages

# 将 love-record 目录推送到 gh-pages 分支，由「从分支发布 Pages」提供站点。
# 仓库 Settings → Pages：Source 选「Deploy from a branch」，Branch 选 gh-pages，文件夹选 / (root)。
# 密钥：Settings → Secrets and variables → Actions → 新建 SUPABASE_URL、SUPABASE_ANON_KEY（勿写进代码）。

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 从仓库 Secrets 写入 config.js，密钥不进 main 分支源码
      - name: Write Supabase config
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 << 'PY'
          import json, os
          url = (os.environ.get("SB_URL") or "").strip()
          key = (os.environ.get("SB_KEY") or "").strip()
          cfg = {"SUPABASE_URL": url, "SUPABASE_ANON_KEY": key}
          with open("love-record/js/config.js", "w", encoding="utf-8") as f:
              f.write("window.__LOVE_RECORD_CONFIG__ = ")
              f.write(json.dumps(cfg, ensure_ascii=False))
              f.write(";\n")
          PY

      - name: Push love-record to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./love-record
