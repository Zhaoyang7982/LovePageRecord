<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <script>
    /* GitHub Pages 访问 /xxx 无末尾斜杠时，相对路径会错；强制补上目录 base */
    (function () {
      try {
        var p = location.pathname;
        if (!p || p === "/") return;
        var dir;
        if (p.endsWith("/")) dir = p;
        else if (/\.[a-z0-9]{2,5}$/i.test(p.split("/").pop() || ""))
          dir = p.replace(/[^/]*$/, "");
        else dir = p + "/";
        if (dir.length > 1) {
          var b = document.createElement("base");
          b.href = dir;
          document.head.insertBefore(b, document.head.firstChild);
        }
      } catch (e) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="情侣双向爱意记录 — 专属私密空间" />
  <title>爱意记录 · Love Record</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="css/style.css?v=8" />
</head>
<body>
  <div class="bg-particles" aria-hidden="true">
    <span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span>
    <span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span>
    <span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span>
    <span class="particle"></span><span class="particle"></span>
  </div>
  <!-- 登录 -->
  <section id="login-screen" class="screen screen--center" aria-label="登录">
    <div class="login-card glass">
      <h1 class="brand">爱意记录</h1>
      <div class="login-heart-wrap" aria-hidden="true">
        <svg class="login-heart" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="loginHeartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f0b8d0" />
              <stop offset="55%" stop-color="#e8a0bf" />
              <stop offset="100%" stop-color="#c97ba3" />
            </linearGradient>
          </defs>
          <path
            fill="url(#loginHeartGrad)"
            d="M50 78 C18 52 6 38 6 28 C6 16 15 8 26 8 C36 8 45 14 50 22 C55 14 64 8 74 8 C85 8 94 16 94 28 C94 38 82 52 50 78Z"
          />
        </svg>
      </div>
      <p class="tagline">为彼此留下温暖瞬间</p>
      <form id="login-form" class="login-form" novalidate>
        <label class="field">
          <span>账号</span>
          <input type="text" id="login-user" name="username" autocomplete="username" required placeholder="请输入账号" />
        </label>
        <label class="field">
          <span>密码</span>
          <input type="password" id="login-pass" name="password" autocomplete="current-password" required placeholder="请输入密码" />
        </label>
        <button type="submit" class="btn btn--primary btn--block">进入</button>
      </form>
    </div>
  </section>

  <!-- 主界面 -->
  <section id="app-screen" class="screen screen--app hidden" aria-label="主界面">
    <header class="app-header glass">
      <div class="header-left">
        <h1 class="brand brand--small">爱意记录</h1>
        <span id="role-badge" class="role-badge"></span>
      </div>
      <button type="button" id="btn-logout" class="btn btn--ghost">退出</button>
    </header>

    <main class="app-main">
      <div class="toolbar">
        <button type="button" id="btn-open-publish" class="btn btn--primary">为 Ta 记录一条</button>
        <button type="button" id="btn-open-travel" class="btn btn--ghost">奇奇玉玉旅游去过的地方</button>
        <div class="view-switch" role="tablist" aria-label="记录视图切换">
          <button type="button" id="btn-view-received" class="btn btn--ghost btn--sm is-active">对方为我</button>
          <button type="button" id="btn-view-sent" class="btn btn--ghost btn--sm">我为对方</button>
        </div>
        <p id="stats-tip" class="hint stats-tip"></p>
        <div id="countdown-tip" class="hint countdown-tip"></div>
        <p id="sync-banner" class="hint sync-banner hidden" role="status"></p>
      </div>

      <div id="cards-wrap" class="cards-wrap">
        <p id="empty-tip" class="empty-tip hidden">Ta 还没有为你留下记录，把链接发给 Ta 吧～</p>
        <div id="cards-container" class="cards-container"></div>
      </div>
    </main>
  </section>

  <section id="travel-screen" class="screen screen--app hidden" aria-label="旅行足迹页面">
    <header class="app-header glass">
      <div class="header-left">
        <h1 class="brand brand--small">旅行足迹</h1>
        <span class="role-badge">奇奇玉玉旅游去过的地方</span>
      </div>
      <button type="button" id="btn-back-app" class="btn btn--ghost">返回主页</button>
    </header>
    <main class="app-main">
      <section class="travel-section glass" aria-label="旅行足迹">
        <h2 class="travel-title">我们旅游去过的地方</h2>
        <p id="travel-stats" class="travel-stats"></p>
        <form id="travel-form" class="travel-form">
          <input id="travel-city" type="text" placeholder="城市名（如：上海）" required />
          <input id="travel-date" type="date" />
          <button type="submit" class="btn btn--primary btn--sm">添加标记</button>
        </form>
        <p class="hint">双方都可以添加城市；日期可不填。</p>
        <div id="travel-map" class="travel-map"></div>
        <div id="travel-list" class="travel-list"></div>
      </section>
    </main>
  </section>

  <!-- 发布面板 -->
  <div id="publish-overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="publish-title">
    <div class="panel glass">
      <div class="panel-head">
        <h2 id="publish-title">为 Ta 写一条</h2>
        <button type="button" id="btn-close-publish" class="icon-btn" aria-label="关闭">×</button>
      </div>
      <form id="publish-form" class="publish-form">
        <label class="field">
          <span>文字</span>
          <textarea id="publish-text" rows="5" placeholder="写下想对 Ta 说的话、小事或心情…"></textarea>
        </label>
        <label class="field">
          <span>照片（可选，可多选）</span>
          <div class="picker-actions">
            <button type="button" id="btn-pick-camera" class="btn btn--ghost">手机拍照</button>
            <button type="button" id="btn-pick-album" class="btn btn--ghost">本地相册</button>
          </div>
          <input type="file" id="publish-files-camera" class="hidden" accept="image/*" multiple capture="environment" />
          <input type="file" id="publish-files-album" class="hidden" accept="image/*" multiple />
        </label>
        <div id="publish-preview" class="preview-grid"></div>
        <button type="submit" class="btn btn--primary btn--block">发布</button>
        <button type="button" id="btn-delete-record" class="btn btn--danger btn--block hidden">删除这条记录</button>
      </form>
    </div>
  </div>

  <!-- 详情 -->
  <div id="detail-overlay" class="overlay overlay--detail hidden" role="dialog" aria-modal="true">
    <div class="detail-card glass">
      <button type="button" id="btn-close-detail" class="icon-btn icon-btn--float" aria-label="关闭">×</button>
      <div id="detail-date" class="detail-date"></div>
      <div id="detail-gallery" class="detail-gallery"></div>
      <p id="detail-text" class="detail-text"></p>
      <button type="button" id="btn-edit-detail" class="btn btn--primary btn--block hidden">编辑这条记录</button>
    </div>
  </div>

  <!-- 图片放大 -->
  <div id="image-overlay" class="overlay overlay--image hidden" role="dialog" aria-modal="true">
    <button type="button" id="btn-close-image" class="icon-btn icon-btn--float icon-btn--image" aria-label="关闭">×</button>
    <img id="image-zoom" class="image-zoom" alt="放大图片" />
  </div>

  <div id="toast" class="toast hidden" role="status"></div>

  <script defer src="js/config.defaults.js?v=1"></script>
  <script defer src="js/config.local.js"></script>
  <script
    defer
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script defer src="js/main.js?v=10"></script>
</body>
</html>
